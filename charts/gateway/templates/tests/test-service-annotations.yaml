{{- if .Values.service.annotations }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "trino-gateway.fullname" . }}-test-service-annotations
  labels:
    {{- include "trino-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
    test: service-annotations
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  serviceAccountName: {{ include "trino-gateway.fullname" . }}-test-service-annotations
  containers:
    - name: service-annotations
      image: python:3-slim
      command: ["python", "/tests/test.py"]
      args: ["{{ .Values.serviceName }}"]
      volumeMounts:
        - name: tests
          mountPath: /tests
  volumes:
    - name: tests
      configMap:
        name: {{ include "trino-gateway.fullname" . }}-test-service-annotations
  restartPolicy: Never
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trino-gateway.fullname" . }}-test-service-annotations
  labels:
    {{- include "trino-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
    test: service-annotations
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded
data:
  test.py: |
    from urllib.request import urlopen, Request
    from urllib.error import URLError, HTTPError
    import json
    import logging
    import os
    import ssl
    import sys

    logging.basicConfig(level=logging.INFO, format='%(levelname)s: %(message)s')
    logger = logging.getLogger(__name__)

    service_name = sys.argv[1]
    namespace_file = "/var/run/secrets/kubernetes.io/serviceaccount/namespace"
    token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    with open(namespace_file) as f:
        namespace = f.read().strip()
    with open(token_file) as f:
        token = f.read().strip()

    expected_type = "{{ .Values.service.type }}"
    expected_annotations = {
    {{- range $key, $value := .Values.service.annotations }}
        "{{ $key }}": "{{ $value }}",
    {{- end }}
    }

    logger.info(f"Validating service '{service_name}' in namespace '{namespace}'")

    url = f"https://kubernetes.default.svc/api/v1/namespaces/{namespace}/services/{service_name}"
    ctx = ssl.create_default_context(cafile=ca_file)
    req = Request(url, headers={"Authorization": f"Bearer {token}"})

    try:
        with urlopen(req, context=ctx, timeout=10) as response:
            data = json.load(response)
    except (URLError, HTTPError) as e:
        logger.error(f"Failed to fetch service: {e}")
        sys.exit(1)

    actual_annotations = data.get("metadata", {}).get("annotations", {})
    actual_type = data.get("spec", {}).get("type", "")
    failed = False

    # Verify each expected annotation exists with the correct value
    for key, value in expected_annotations.items():
        actual = actual_annotations.get(key, "")
        if actual == value:
            logger.info(f"PASS: annotation '{key}' = '{value}'")
        else:
            logger.error(f"FAIL: annotation '{key}' expected '{value}', got '{actual}'")
            failed = True

    # Verify service type
    if actual_type == expected_type:
        logger.info(f"PASS: service type is '{expected_type}'")
    else:
        logger.error(f"FAIL: service type expected '{expected_type}', got '{actual_type}'")
        failed = True

    if failed:
        logger.error("Test FAILED")
        sys.exit(1)
    logger.info("All annotation and service type checks passed")
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "trino-gateway.fullname" . }}-test-service-annotations
  labels:
    {{- include "trino-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
    test: service-annotations
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "trino-gateway.fullname" . }}-test-service-annotations
  labels:
    {{- include "trino-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
    test: service-annotations
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "trino-gateway.fullname" . }}-test-service-annotations
  labels:
    {{- include "trino-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
    test: service-annotations
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "trino-gateway.fullname" . }}-test-service-annotations
subjects:
  - kind: ServiceAccount
    name: {{ include "trino-gateway.fullname" . }}-test-service-annotations
    namespace: {{ .Release.Namespace }}
{{- end }}
