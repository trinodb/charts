{{- if or .Values.catalogs .Values.additionalCatalogs }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "trino.catalog" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trino.labels" . | nindent 4 }}
    app.kubernetes.io/component: catalogs
data:
{{- $templatedCatalogs := dict }}
{{- range $catalogName, $catalogProperties := .Values.catalogs }}
{{- $templatedCatalogs = set $templatedCatalogs $catalogName (tpl $catalogProperties $) }}
{{- end }}
{{- $merged := merge $templatedCatalogs .Values.additionalCatalogs }}
{{- range $catalogName, $catalogProperties := $merged }}
  {{ $catalogName }}.properties: |
    {{- $catalogProperties | nindent 4 }}
{{- end }}
{{- end }}
